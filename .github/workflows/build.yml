name: Build GKI BTF KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex libssl-dev libelf-dev python3 python-is-python3 dwarves cpio kmod wget unzip

      - name: Setup repo tool
        run: |
          mkdir -p ~/.local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
          chmod +x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync kernel source
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -j$(nproc) --no-tags --no-clone-bundle

      - name: Integrate KernelSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Build kernel (base GKI build)
        run: |
          cd kernel
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Inject BTF into built kernel
        run: |
          cd kernel
          OUTDIR="${PWD}/out/android12-5.10/common"

          echo "=== Pahole version ==="
          pahole --version

          echo "=== Enabling BTF in .config ==="
          common/scripts/config --file ${OUTDIR}/.config --enable CONFIG_DEBUG_INFO_BTF
          common/scripts/config --file ${OUTDIR}/.config --enable CONFIG_DEBUG_INFO_BTF_MODULES
          grep "CONFIG_DEBUG_INFO_BTF" ${OUTDIR}/.config

          echo "=== Running olddefconfig to validate dependencies ==="
          export PATH="${PWD}/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:${PWD}/prebuilts/build-tools/linux-x86/bin:${PWD}/prebuilts/gas/linux-x86:/usr/bin:/usr/local/bin:${PATH}"
          make ARCH=arm64 O=${OUTDIR} LLVM=1 LLVM_IAS=1 DEPMOD=depmod DTC=dtc -C common olddefconfig

          echo "=== Verifying BTF survived olddefconfig ==="
          grep "CONFIG_DEBUG_INFO_BTF=y" ${OUTDIR}/.config || { echo "FATAL: BTF removed by olddefconfig"; exit 1; }
          echo "BTF CONFIG OK"

          echo "=== Rebuilding Image with BTF (pahole encoding + relink only) ==="
          make ARCH=arm64 O=${OUTDIR} LLVM=1 LLVM_IAS=1 DEPMOD=depmod DTC=dtc -C common -j$(nproc) Image

          echo "=== Updating dist Image ==="
          cp ${OUTDIR}/arch/arm64/boot/Image out/android12-5.10/dist/Image
          ls -lh out/android12-5.10/dist/Image

      - name: Verify BTF in final kernel
        run: |
          OUTDIR=kernel/out/android12-5.10/common
          grep "CONFIG_DEBUG_INFO_BTF=y" ${OUTDIR}/.config || { echo "FATAL: CONFIG_DEBUG_INFO_BTF not compiled in!"; exit 1; }
          echo "BTF VERIFIED OK"

      - name: Setup magiskboot
        run: |
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O magisk.apk
          unzip -q magisk.apk lib/x86_64/libmagiskboot.so -d magisk_tmp
          cp magisk_tmp/lib/x86_64/libmagiskboot.so ./magiskboot
          chmod +x ./magiskboot

      - name: Download base boot-gz image
        run: |
          wget -q "https://github.com/tiann/KernelSU/releases/download/v0.9.5/android12-5.10.198_2024-01-boot-gz.img.gz" -O base_boot.img.gz
          gunzip base_boot.img.gz
          ls -lh base_boot.img

      - name: Repack with new kernel
        run: |
          mkdir boot_work && cd boot_work
          cp ../base_boot.img .
          ../magiskboot unpack base_boot.img
          cp ../kernel/out/android12-5.10/dist/Image kernel
          ../magiskboot repack base_boot.img ../boot_btf_gz.img
          ls -lh ../boot_btf_gz.img

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: gki-btf-boot
          path: boot_btf_gz.img
          retention-days: 7
